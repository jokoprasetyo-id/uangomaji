<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMAJI - Financial Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #0f172a;
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --info: #3b82f6;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Layout --- */
        .header { 
            background: var(--primary); 
            color: white; 
            padding: 1.25rem 2rem; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em; }
        .header-badge { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 500; }

        .nav { 
            background: var(--card); 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            padding: 0 2rem; 
            gap: 1.5rem;
            overflow-x: auto;
        }

        .nav button { 
            padding: 1rem 0.5rem; 
            background: none; 
            border: none; 
            border-bottom: 2px solid transparent;
            font-size: 0.875rem; 
            font-weight: 600; 
            color: var(--text-muted); 
            cursor: pointer; 
            transition: 0.2s;
            white-space: nowrap;
        }

        .nav button.active { color: var(--primary); border-bottom-color: var(--primary); }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }

        /* --- Widgets --- */
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        
        .metric { 
            background: var(--card); 
            padding: 1.5rem; 
            border-radius: var(--radius-lg); 
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .metric:hover { transform: translateY(-4px); }
        .metric .lbl { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem; }
        .metric .val { font-size: 1.75rem; font-weight: 800; }
        .metric .sub { font-size: 0.875rem; color: var(--text-muted); margin-top: 0.25rem; }

        .card { 
            background: var(--card); 
            border-radius: var(--radius-lg); 
            border: 1px solid var(--border); 
            padding: 1.5rem; 
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }

        .card h3 { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1.25rem; text-transform: uppercase; letter-spacing: 0.05em; }

        /* --- Tables --- */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; color: var(--text-muted); background: #f8fafc; border-bottom: 1px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.875rem; }
        
        /* --- Buttons --- */
        .btn-add { background: var(--primary); color: white; padding: 0.6rem 1.2rem; border-radius: var(--radius-md); border: none; font-weight: 600; cursor: pointer; }
        .act-btn { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: white; margin-right: 4px; }
        .act-btn.edit { color: var(--info); }
        .act-btn.del { color: var(--danger); }

        /* --- Badges --- */
        .badge { padding: 4px 10px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .bl { background: #dcfce7; color: #166534; } /* Lunas */
        .bb { background: #fee2e2; color: #991b1b; } /* Belum */

        /* --- Components --- */
        .sync-status { font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 99px; }
        .sync-ok { background: #059669; color: #ecfdf5; }

        .laba-bersih { 
            background: #f0fdf4; 
            border: 1px dashed var(--success); 
            padding: 1.5rem; 
            border-radius: var(--radius-md); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        /* Chart Grids */
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; }
        @media (max-width: 600px) { .chart-grid { grid-template-columns: 1fr; } }

    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:1rem;">
        <span class="logo">OMAJI</span>
        <span class="header-badge">Admin Panel 2026</span>
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
        <span id="syncStatus" class="sync-status sync-ok">● Connected</span>
        <button onclick="exportCSV()" style="background:none; border:1px solid rgba(255,255,255,0.3); color:white; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:0.8rem;">Export</button>
    </div>
</div>

<nav class="nav">
    <button class="active" onclick="showPage('dashboard',this)">Dashboard</button>
    <button onclick="showPage('kas-masuk',this)">Kas Masuk</button>
    <button onclick="showPage('kas-keluar',this)">Kas Keluar</button>
    <button onclick="showPage('laba-rugi',this)">Laba Rugi</button>
    <button onclick="showPage('alokasi',this)">Alokasi</button>
</nav>

<div class="container">
    <div id="page-dashboard" class="page active">
        <div class="metrics">
            <div class="metric"><div class="lbl">Pendapatan</div><div class="val" id="m1" style="color:var(--success)">-</div><div class="sub" id="m1s"></div></div>
            <div class="metric"><div class="lbl">Pengeluaran</div><div class="val" id="m2" style="color:var(--danger)">-</div><div class="sub" id="m2s"></div></div>
            <div class="metric"><div class="lbl">Laba Bersih</div><div class="val" id="m3" style="color:var(--info)">-</div><div class="sub" id="m3s"></div></div>
        </div>

        <div class="chart-grid">
            <div class="card"><h3>Performa Bulanan</h3><canvas id="cB" height="250"></canvas></div>
            <div class="card"><h3>Struktur Biaya</h3><canvas id="cK" height="250"></canvas></div>
        </div>
    </div>

    <div id="page-kas-masuk" class="page" style="display:none">
        <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem; align-items:center;">
            <h2 style="font-size:1.25rem;">Data Arus Kas Masuk</h2>
            <button class="btn-add" onclick="openModal('masuk',null)">+ Transaksi Baru</button>
        </div>
        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Tanggal</th><th>Deskripsi</th><th>Kategori</th><th>Status</th><th style="text-align:right">Nominal</th><th>Aksi</th></tr></thead>
                    <tbody id="tbM"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="page-laba-rugi" class="page" style="display:none">
        <div class="card" style="max-width:600px; margin: 0 auto;">
            <h2 style="text-align:center; margin-bottom:2rem;">Laporan Laba Rugi</h2>
            <div id="labaC"></div>
        </div>
    </div>
</div>

<div id="mOv" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; align-items:center; justify-content:center;">
    <div class="card" style="width:100%; max-width:400px; margin:1rem;">
        <h2 id="mTitle" style="margin-bottom:1rem;">Form Transaksi</h2>
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:1.5rem;">
            <button onclick="closeModal()" style="padding:8px 16px; background:#e2e8f0; border:none; border-radius:8px; cursor:pointer;">Batal</button>
            <button onclick="saveTrx()" class="btn-add">Simpan Data</button>
        </div>
    </div>
</div>

<script>
    // Gunakan logika JavaScript Firebase yang Anda miliki sebelumnya.
    // Tambahkan fungsi showPage yang lebih smooth:
    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        
        document.getElementById('page-' + id).style.display = 'block';
        btn.classList.add('active');
        
        // Trigger Chart Resize jika diperlukan
        if(id === 'dashboard') refreshDash();
    }

    // Tips: Tambahkan konfigurasi Chart.js yang lebih minimalis:
    const chartOptions = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { display: false }
        },
        scales: {
            y: { grid: { display: false }, ticks: { display: false }},
            x: { grid: { display: false }}
        }
    };
</script>
</body>
</html>
